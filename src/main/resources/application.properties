# =============================================
# JEWELRY SHOP - APPLICATION CONFIGURATION
# =============================================

# Server
server.port=8080

# =============================================
# DATABASE - SQL SERVER
# =============================================
# Thay 'localhost' và 'sa' / 'your_password' theo máy của bạn
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=jewelry_shop;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=true

# =============================================
# THYMELEAF
# =============================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =============================================
# FILE UPLOAD
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Thu muc luu anh upload (tuong doi so voi thu muc chay project)
file.upload-dir=uploads

# =============================================
# SPRING SECURITY
# =============================================
spring.security.remember-me.key=jewelry-shop-remember-me-secret-key-2024

# =============================================
# LOGGING
# =============================================
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
