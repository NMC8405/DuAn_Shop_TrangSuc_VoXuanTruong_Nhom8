<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head><meta charset="UTF-8"><title>Danh Mục - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <h4 class="mb-0 fw-bold" th:text="${category.id == null} ? 'Thêm Danh Mục' : 'Sửa Danh Mục'"></h4>
    <div class="ms-auto"><a th:href="@{/admin/categories}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i>Quay Lại</a></div>
  </div>
  <div class="admin-content">
    <div class="admin-card" style="max-width:600px">
      <form th:action="@{/admin/categories/save}" method="post" th:object="${category}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" th:field="*{id}"/>
        <div class="mb-3">
          <label class="form-label fw-semibold">Tên danh mục <span class="text-danger">*</span></label>
          <input type="text" class="form-control" th:field="*{name}" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" required>
          <div class="invalid-feedback" th:errors="*{name}"></div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Mô tả</label>
          <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Trạng thái</label>
          <select class="form-select" th:field="*{active}">
            <option value="true">Hoạt động</option>
            <option value="false">Ẩn</option>
          </select>
        </div>
        <button type="submit" class="btn btn-gold px-4"><i class="fas fa-save me-2"></i>Lưu</button>
        <a th:href="@{/admin/categories}" class="btn btn-outline-secondary ms-2">Hủy</a>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>function toggleSidebar(){document.querySelector('.admin-sidebar').classList.toggle('collapsed');document.querySelector('.admin-main').classList.toggle('expanded');}</script>
</body></html>
