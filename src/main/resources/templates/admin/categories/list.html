<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head><meta charset="UTF-8"><title>Danh Mục - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <h4 class="mb-0 fw-bold"><i class="fas fa-tags me-2 text-gold"></i>Quản Lý Danh Mục</h4>
    <div class="ms-auto"><a th:href="@{/admin/categories/new}" class="btn btn-gold"><i class="fas fa-plus me-2"></i>Thêm Danh Mục</a></div>
  </div>
  <div class="admin-content">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span><button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="admin-card">
      <table class="table table-hover admin-table align-middle">
        <thead><tr><th>#</th><th>Tên Danh Mục</th><th>Mô Tả</th><th>Trạng Thái</th><th class="text-center">Thao Tác</th></tr></thead>
        <tbody>
          <tr th:each="cat : ${categories}">
            <td th:text="${cat.id}"></td>
            <td class="fw-semibold" th:text="${cat.name}"></td>
            <td class="text-muted small" th:text="${cat.description}"></td>
            <td><span th:class="${cat.active} ? 'badge bg-success' : 'badge bg-secondary'" th:text="${cat.active} ? 'Hoạt động' : 'Ẩn'"></span></td>
            <td class="text-center">
              <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}" class="btn btn-xs btn-outline-warning me-1"><i class="fas fa-edit"></i></a>
              <form th:action="@{/admin/categories/delete/{id}(id=${cat.id})}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-xs btn-outline-danger" onclick="return confirm('Xóa danh mục này?')"><i class="fas fa-trash"></i></button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>function toggleSidebar(){document.querySelector('.admin-sidebar').classList.toggle('collapsed');document.querySelector('.admin-main').classList.toggle('expanded');}</script>
</body></html>
