<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head><meta charset="UTF-8"><title>Mã Giảm Giá - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <h4 class="mb-0 fw-bold" th:text="${coupon.id == null} ? 'Tạo Mã Mới' : 'Sửa Mã Giảm Giá'"></h4>
    <div class="ms-auto"><a th:href="@{/admin/coupons}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i>Quay Lại</a></div>
  </div>
  <div class="admin-content">
    <div class="admin-card" style="max-width:650px">
      <form th:action="@{/admin/coupons/save}" method="post" th:object="${coupon}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" th:field="*{id}"/>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Mã Coupon <span class="text-danger">*</span></label>
            <input type="text" class="form-control" th:field="*{code}" th:classappend="${#fields.hasErrors('code')} ? 'is-invalid'" placeholder="VD: SUMMER20" style="text-transform:uppercase" required>
            <div class="invalid-feedback" th:errors="*{code}"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Loại Giảm Giá</label>
            <select class="form-select" th:field="*{discountType}">
              <option th:each="type : ${discountTypes}" th:value="${type.name()}"
                      th:text="${type.displayName}"></option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Giá Trị Giảm <span class="text-danger">*</span></label>
            <input type="number" class="form-control" th:field="*{discountValue}" th:classappend="${#fields.hasErrors('discountValue')} ? 'is-invalid'" min="0.01" step="0.01" required>
            <div class="invalid-feedback" th:errors="*{discountValue}"></div>
            <small class="text-muted">% nếu theo phần trăm, số tiền nếu cố định</small>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Giảm Tối Đa (đ)</label>
            <input type="number" class="form-control" th:field="*{maxDiscount}" min="0" placeholder="Để trống = không giới hạn">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Đơn Hàng Tối Thiểu (đ)</label>
            <input type="number" class="form-control" th:field="*{minOrderAmount}" min="0" step="1000">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Số Lần Dùng Tối Đa</label>
            <input type="number" class="form-control" th:field="*{maxUses}" min="1">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Ngày Hết Hạn</label>
            <input type="datetime-local" class="form-control" th:field="*{expiredAt}">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Trạng Thái</label>
            <select class="form-select" th:field="*{active}">
              <option value="true">Hoạt động</option>
              <option value="false">Tắt</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Mô Tả</label>
            <input type="text" class="form-control" th:field="*{description}" placeholder="Mô tả ngắn về mã giảm giá">
          </div>
        </div>
        <div class="mt-4">
          <button type="submit" class="btn btn-gold px-4"><i class="fas fa-save me-2"></i>Lưu</button>
          <a th:href="@{/admin/coupons}" class="btn btn-outline-secondary ms-2">Hủy</a>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>function toggleSidebar(){document.querySelector('.admin-sidebar').classList.toggle('collapsed');document.querySelector('.admin-main').classList.toggle('expanded');}</script>
</body></html>
