<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head><meta charset="UTF-8"><title>Mã Giảm Giá - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <h4 class="mb-0 fw-bold"><i class="fas fa-ticket-alt me-2 text-gold"></i>Quản Lý Mã Giảm Giá</h4>
    <div class="ms-auto"><a th:href="@{/admin/coupons/new}" class="btn btn-gold"><i class="fas fa-plus me-2"></i>Tạo Mã Mới</a></div>
  </div>
  <div class="admin-content">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span><button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="admin-card">
      <table class="table table-hover admin-table align-middle">
        <thead><tr><th>Mã</th><th>Loại</th><th>Giá Trị</th><th>Đơn Tối Thiểu</th><th>Đã Dùng / Tổng</th><th>Hết Hạn</th><th>Trạng Thái</th><th class="text-center">Thao Tác</th></tr></thead>
        <tbody>
          <tr th:each="coupon : ${coupons}">
            <td><code class="fw-bold fs-6" th:text="${coupon.code}"></code></td>
            <td>
              <span th:text="${coupon.discountType.displayName}" class="badge bg-light text-dark"></span>
            </td>
            <td class="fw-bold text-gold">
              <span th:if="${coupon.discountType.name() == 'PERCENTAGE'}" th:text="${coupon.discountValue + '%'}"></span>
              <span th:if="${coupon.discountType.name() == 'FIXED_AMOUNT'}"
                    th:text="${#numbers.formatDecimal(coupon.discountValue,0,'COMMA',0,'POINT')+'đ'}"></span>
            </td>
            <td th:text="${#numbers.formatDecimal(coupon.minOrderAmount,0,'COMMA',0,'POINT')+'đ'}"></td>
            <td>
              <div class="progress" style="height:6px;width:80px">
                <div class="progress-bar bg-gold"
                     th:style="'width:' + ${coupon.usedCount * 100 / coupon.maxUses} + '%'"></div>
              </div>
              <small class="text-muted"><span th:text="${coupon.usedCount}"></span>/<span th:text="${coupon.maxUses}"></span></small>
            </td>
            <td class="small" th:text="${coupon.expiredAt != null ? #temporals.format(coupon.expiredAt,'dd/MM/yyyy') : '---'}"></td>
            <td>
              <span th:class="${coupon.valid} ? 'badge bg-success' : 'badge bg-secondary'"
                    th:text="${coupon.valid} ? 'Hoạt động' : 'Hết hạn/Hết lượt'"></span>
            </td>
            <td class="text-center">
              <a th:href="@{/admin/coupons/edit/{id}(id=${coupon.id})}" class="btn btn-xs btn-outline-warning me-1"><i class="fas fa-edit"></i></a>
              <form th:action="@{/admin/coupons/delete/{id}(id=${coupon.id})}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-xs btn-outline-danger" onclick="return confirm('Xóa mã này?')"><i class="fas fa-trash"></i></button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>function toggleSidebar(){document.querySelector('.admin-sidebar').classList.toggle('collapsed');document.querySelector('.admin-main').classList.toggle('expanded');}</script>
</body></html>
