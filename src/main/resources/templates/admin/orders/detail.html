<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi Tiết Đơn - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <h4 class="mb-0 fw-bold">Đơn Hàng #<span th:text="${order.id}"></span></h4>
    <div class="ms-auto"><a th:href="@{/admin/orders}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i>Quay Lại</a></div>
  </div>
  <div class="admin-content">
    <div th:if="${success}" class="alert alert-success"><i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span></div>
    <div th:if="${error}" class="alert alert-danger"><i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span></div>
    <div class="row g-4">
      <div class="col-lg-8">
        <!-- Products -->
        <div class="admin-card mb-4">
          <h6 class="fw-bold mb-3"><i class="fas fa-box me-2 text-gold"></i>Sản Phẩm Đặt</h6>
          <div class="order-item" th:each="item : ${order.orderItems}">
            <img th:src="${item.productImage != null} ? ${item.productImage} : '/images/no-image.png'" class="order-item-img">
            <div class="flex-grow-1 ms-3">
              <div class="fw-semibold" th:text="${item.productName}"></div>
              <div class="text-muted small">
                SL: <span th:text="${item.quantity}"></span> ×
                <span th:text="${#numbers.formatDecimal(item.price,0,'COMMA',0,'POINT')+'đ'}"></span>
              </div>
            </div>
            <div class="fw-bold text-gold"
                 th:text="${#numbers.formatDecimal(item.price * item.quantity,0,'COMMA',0,'POINT')+'đ'}"></div>
          </div>
          <hr>
          <div class="d-flex justify-content-between mb-1">
            <span>Tổng tiền hàng</span>
            <span th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')+'đ'}"></span>
          </div>
          <div class="d-flex justify-content-between text-success mb-1" th:if="${order.discountAmount > 0}">
            <span>Giảm giá (<span th:text="${order.couponCode}"></span>)</span>
            <span th:text="'-'+${#numbers.formatDecimal(order.discountAmount,0,'COMMA',0,'POINT')+'đ'}"></span>
          </div>
          <div class="d-flex justify-content-between fw-bold text-gold fs-5 mt-2">
            <span>Tổng Cộng</span>
            <span th:text="${#numbers.formatDecimal(order.finalAmount,0,'COMMA',0,'POINT')+'đ'}"></span>
          </div>
        </div>
        <!-- Shipping -->
        <div class="admin-card">
          <h6 class="fw-bold mb-3"><i class="fas fa-truck me-2 text-gold"></i>Thông Tin Giao Hàng</h6>
          <div class="row g-2">
            <div class="col-md-6">
              <label class="text-muted small">Tên người nhận</label>
              <div class="fw-semibold" th:text="${order.shippingName}"></div>
            </div>
            <div class="col-md-6">
              <label class="text-muted small">Điện thoại</label>
              <div class="fw-semibold" th:text="${order.shippingPhone}"></div>
            </div>
            <div class="col-12">
              <label class="text-muted small">Địa chỉ</label>
              <div th:text="${order.shippingAddress}"></div>
            </div>
            <div class="col-12" th:if="${order.note}">
              <label class="text-muted small">Ghi chú</label>
              <div class="text-muted fst-italic" th:text="${order.note}"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <!-- Status Update -->
        <div class="admin-card mb-4">
          <h6 class="fw-bold mb-3"><i class="fas fa-exchange-alt me-2 text-gold"></i>Cập Nhật Trạng Thái</h6>
          <div class="mb-3">
            <div class="current-status-badge">
              <span class="text-muted small">Trạng thái hiện tại:</span>
              <br>
              <span th:class="'badge status-badge-sm status-' + ${order.status.name().toLowerCase()} + ' mt-1'"
                    th:text="${order.status.displayName}" style="font-size:0.9rem"></span>
            </div>
          </div>
          <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post"
                th:if="${order.status.name() != 'COMPLETED' and order.status.name() != 'CANCELLED'}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
              <label class="form-label fw-semibold">Chuyển sang</label>
              <select class="form-select" name="status">
                <option th:if="${order.status.name() == 'PENDING'}" value="CONFIRMED">✅ Xác Nhận Đơn</option>
                <option th:if="${order.status.name() == 'PENDING'}" value="CANCELLED">❌ Hủy Đơn</option>
                <option th:if="${order.status.name() == 'CONFIRMED'}" value="SHIPPING">🚚 Bắt Đầu Giao</option>
                <option th:if="${order.status.name() == 'CONFIRMED'}" value="CANCELLED">❌ Hủy Đơn</option>
                <option th:if="${order.status.name() == 'SHIPPING'}" value="COMPLETED">🏠 Giao Thành Công</option>
              </select>
            </div>
            <button type="submit" class="btn btn-gold w-100">
              <i class="fas fa-check me-2"></i>Cập Nhật
            </button>
          </form>
          <div th:if="${order.status.name() == 'COMPLETED'}" class="alert alert-success mb-0">
            <i class="fas fa-check-circle me-2"></i>Đơn hàng hoàn thành
          </div>
          <div th:if="${order.status.name() == 'CANCELLED'}" class="alert alert-danger mb-0">
            <i class="fas fa-ban me-2"></i>Đơn hàng đã hủy
          </div>
        </div>
        <!-- Order info -->
        <div class="admin-card">
          <h6 class="fw-bold mb-3"><i class="fas fa-info-circle me-2 text-gold"></i>Thông Tin Đơn</h6>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted small">Mã đơn</span>
            <span class="fw-bold">#<span th:text="${order.id}"></span></span>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted small">Ngày đặt</span>
            <span th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy HH:mm')}"></span>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted small">Thanh toán</span>
            <span class="badge bg-info">COD</span>
          </div>
          <div class="d-flex justify-content-between" th:if="${order.couponCode}">
            <span class="text-muted small">Mã giảm giá</span>
            <span class="badge bg-warning text-dark" th:text="${order.couponCode}"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>function toggleSidebar(){document.querySelector('.admin-sidebar').classList.toggle('collapsed');document.querySelector('.admin-main').classList.toggle('expanded');}</script>
</body>
</html>
