<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Đơn Hàng - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <h4 class="mb-0 fw-bold"><i class="fas fa-shopping-bag me-2 text-gold"></i>Quản Lý Đơn Hàng</h4>
  </div>
  <div class="admin-content">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
      <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <!-- Filter tabs -->
    <div class="admin-card mb-4 p-3">
      <div class="d-flex flex-wrap gap-2">
        <a th:href="@{/admin/orders}" class="btn btn-sm"
           th:classappend="${selectedStatus == null} ? 'btn-gold' : 'btn-outline-secondary'">Tất cả</a>
        <a th:each="st : ${statuses}" th:href="@{/admin/orders(status=${st.name()})}"
           th:classappend="${selectedStatus == st.name()} ? 'btn-gold' : 'btn-outline-secondary'"
           class="btn btn-sm" th:text="${st.displayName}"></a>
      </div>
    </div>
    <div class="admin-card">
      <div class="table-responsive">
        <table class="table table-hover admin-table align-middle">
          <thead>
            <tr>
              <th>#</th><th>Khách Hàng</th><th>Địa Chỉ</th>
              <th>Tổng Tiền</th><th>Trạng Thái</th><th>Ngày Đặt</th><th class="text-center">Thao Tác</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="order : ${orders.content}">
              <td class="fw-bold">#<span th:text="${order.id}"></span></td>
              <td>
                <div class="fw-semibold" th:text="${order.shippingName}"></div>
                <small class="text-muted" th:text="${order.shippingPhone}"></small>
              </td>
              <td class="small text-muted" style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                  th:text="${order.shippingAddress}"></td>
              <td class="fw-bold text-gold"
                  th:text="${#numbers.formatDecimal(order.finalAmount,0,'COMMA',0,'POINT')+'đ'}"></td>
              <td>
                <span th:class="'badge status-badge-sm status-' + ${order.status.name().toLowerCase()}"
                      th:text="${order.status.displayName}"></span>
              </td>
              <td class="small text-muted"
                  th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy')}"></td>
              <td class="text-center">
                <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-xs btn-outline-gold">
                  <i class="fas fa-eye me-1"></i>Chi tiết
                </a>
              </td>
            </tr>
            <tr th:if="${orders.content.empty}">
              <td colspan="7" class="text-center text-muted py-4">
                <i class="fas fa-inbox fa-2x mb-2 d-block"></i>Không có đơn hàng nào
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <!-- Pagination -->
      <div class="d-flex justify-content-between align-items-center mt-3 px-2">
        <small class="text-muted">Tổng <strong th:text="${orders.totalElements}"></strong> đơn</small>
        <nav th:if="${orders.totalPages > 1}">
          <ul class="pagination pagination-sm mb-0">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
              <a class="page-link" th:href="@{/admin/orders(page=${currentPage-1},status=${selectedStatus})}">‹</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, orders.totalPages-1)}"
                th:classappend="${i == currentPage} ? 'active'">
              <a class="page-link" th:text="${i+1}"
                 th:href="@{/admin/orders(page=${i},status=${selectedStatus})}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == orders.totalPages-1} ? 'disabled'">
              <a class="page-link" th:href="@{/admin/orders(page=${currentPage+1},status=${selectedStatus})}">›</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>function toggleSidebar(){document.querySelector('.admin-sidebar').classList.toggle('collapsed');document.querySelector('.admin-main').classList.toggle('expanded');}</script>
</body>
</html>
