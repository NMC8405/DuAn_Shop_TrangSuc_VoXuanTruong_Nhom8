<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sản Phẩm - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <h4 class="mb-0 fw-bold">
      <span th:text="${product.id == null} ? 'Thêm Sản Phẩm Mới' : 'Chỉnh Sửa Sản Phẩm'"></span>
    </h4>
    <div class="ms-auto">
      <a th:href="@{/admin/products}" class="btn btn-outline-secondary btn-sm">
        <i class="fas fa-arrow-left me-1"></i>Quay Lại
      </a>
    </div>
  </div>
  <div class="admin-content">
    <div th:if="${error}" class="alert alert-danger"><i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span></div>

    <form th:action="@{/admin/products/save}" method="post" th:object="${product}"
          enctype="multipart/form-data">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" th:field="*{id}"/>
      <input type="hidden" th:field="*{mainImage}"/>

      <div class="row g-4">
        <!-- Left column -->
        <div class="col-lg-8">
          <div class="admin-card mb-4">
            <h6 class="fw-bold mb-4"><i class="fas fa-info-circle me-2 text-gold"></i>Thông Tin Cơ Bản</h6>
            <div class="mb-3">
              <label class="form-label fw-semibold">Tên sản phẩm <span class="text-danger">*</span></label>
              <input type="text" class="form-control" th:field="*{name}"
                     th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                     placeholder="VD: Nhẫn Kim Cương Vàng 18K">
              <div class="invalid-feedback" th:errors="*{name}"></div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Mô tả sản phẩm</label>
              <textarea class="form-control" th:field="*{description}" rows="5"
                        placeholder="Mô tả chi tiết về sản phẩm..."></textarea>
            </div>
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label fw-semibold">Giá gốc (đ) <span class="text-danger">*</span></label>
                <input type="number" class="form-control" th:field="*{price}" min="0" step="1000"
                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                       placeholder="0">
                <div class="invalid-feedback" th:errors="*{price}"></div>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Giá khuyến mãi (đ)</label>
                <input type="number" class="form-control" th:field="*{salePrice}" min="0" step="1000"
                       placeholder="Để trống nếu không giảm">
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Tồn kho <span class="text-danger">*</span></label>
                <input type="number" class="form-control" th:field="*{stockQuantity}" min="0"
                       th:classappend="${#fields.hasErrors('stockQuantity')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{stockQuantity}"></div>
              </div>
            </div>
          </div>

          <div class="admin-card">
            <h6 class="fw-bold mb-4"><i class="fas fa-info me-2 text-gold"></i>Thông Tin Thêm</h6>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Danh mục</label>
                <select class="form-select" name="categoryId">
                  <option value="">-- Chọn danh mục --</option>
                  <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                          th:selected="${product.category != null and product.category.id == cat.id}"></option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Thương hiệu</label>
                <input type="text" class="form-control" th:field="*{brand}" placeholder="PNJ, DOJI, SJC...">
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Chất liệu</label>
                <input type="text" class="form-control" th:field="*{material}" placeholder="Vàng 18K, Bạc 925...">
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Trạng thái</label>
                <select class="form-select" th:field="*{active}">
                  <option value="true">Đang bán</option>
                  <option value="false">Ẩn</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Right column - Images -->
        <div class="col-lg-4">
          <div class="admin-card mb-4">
            <h6 class="fw-bold mb-4"><i class="fas fa-image me-2 text-gold"></i>Ảnh Chính</h6>
            <div class="image-upload-area" id="mainImgArea" onclick="document.getElementById('mainImageFile').click()">
              <img th:if="${product.mainImage != null}" th:src="${product.mainImage}"
                   id="mainPreview" class="upload-preview">
              <div th:if="${product.mainImage == null}" id="mainPlaceholder">
                <i class="fas fa-cloud-upload-alt fa-3x text-muted mb-2"></i>
                <p class="text-muted mb-0 small">Click để tải ảnh lên</p>
                <p class="text-muted" style="font-size:0.75rem">JPG, PNG, WebP - tối đa 10MB</p>
              </div>
            </div>
            <input type="file" id="mainImageFile" name="mainImageFile" accept="image/*"
                   class="d-none" onchange="previewMainImage(this)">
          </div>

          <div class="admin-card">
            <h6 class="fw-bold mb-3"><i class="fas fa-images me-2 text-gold"></i>Ảnh Phụ</h6>
            <!-- Existing images -->
            <div th:if="${product.images != null and !product.images.empty}" class="mb-3">
              <div class="d-flex flex-wrap gap-2">
                <div th:each="img : ${product.images}" class="position-relative">
                  <img th:src="${img.imagePath}" style="width:70px;height:70px;object-fit:cover;border-radius:6px;">
                  <form th:action="@{/admin/products/delete-image/{id}(id=${img.id})}" method="post"
                        style="position:absolute;top:-5px;right:-5px">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="productId" th:value="${product.id}"/>
                    <button type="submit" class="btn btn-danger btn-xs rounded-circle"
                            style="width:20px;height:20px;padding:0;font-size:10px">&times;</button>
                  </form>
                </div>
              </div>
            </div>
            <label class="form-label small text-muted">Tải thêm ảnh phụ (nhiều file)</label>
            <input type="file" name="extraImages" accept="image/*" multiple class="form-control form-control-sm">
          </div>
        </div>
      </div>

      <div class="mt-4 d-flex gap-3">
        <button type="submit" class="btn btn-gold px-5 py-2 fw-bold">
          <i class="fas fa-save me-2"></i>Lưu Sản Phẩm
        </button>
        <a th:href="@{/admin/products}" class="btn btn-outline-secondary px-4">Hủy</a>
      </div>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleSidebar(){document.querySelector('.admin-sidebar').classList.toggle('collapsed');document.querySelector('.admin-main').classList.toggle('expanded');}
function previewMainImage(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      let preview = document.getElementById('mainPreview');
      if (!preview) {
        preview = document.createElement('img');
        preview.id = 'mainPreview';
        preview.className = 'upload-preview';
        document.getElementById('mainImgArea').innerHTML = '';
        document.getElementById('mainImgArea').appendChild(preview);
      }
      preview.src = e.target.result;
    };
    reader.readAsDataURL(input.files[0]);
  }
}
</script>
</body>
</html>
