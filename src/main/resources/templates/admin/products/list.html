<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Sản Phẩm - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <h4 class="mb-0 fw-bold"><i class="fas fa-gem me-2 text-gold"></i>Quản Lý Sản Phẩm</h4>
    <div class="ms-auto">
      <a th:href="@{/admin/products/new}" class="btn btn-gold">
        <i class="fas fa-plus me-2"></i>Thêm Sản Phẩm
      </a>
    </div>
  </div>
  <div class="admin-content">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
      <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="admin-card">
      <div class="table-responsive">
        <table class="table table-hover admin-table align-middle">
          <thead>
            <tr>
              <th>#</th>
              <th>Sản Phẩm</th>
              <th>Danh Mục</th>
              <th>Giá</th>
              <th>Tồn Kho</th>
              <th>Trạng Thái</th>
              <th class="text-center">Thao Tác</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="product : ${products.content}">
              <td class="text-muted small" th:text="${product.id}"></td>
              <td>
                <div class="d-flex align-items-center gap-3">
                  <img th:src="${product.mainImage != null} ? ${product.mainImage} : '/images/no-image.png'"
                       style="width:50px;height:50px;object-fit:cover;border-radius:8px;">
                  <div>
                    <div class="fw-semibold" th:text="${product.name}"></div>
                    <small class="text-muted" th:text="${product.brand}"></small>
                  </div>
                </div>
              </td>
              <td>
                <span class="badge bg-light text-dark"
                      th:text="${product.category != null ? product.category.name : 'Chưa phân loại'}"></span>
              </td>
              <td>
                <div class="fw-bold text-gold"
                     th:text="${#numbers.formatDecimal(product.currentPrice,0,'COMMA',0,'POINT')+'đ'}"></div>
                <small th:if="${product.onSale}" class="text-muted text-decoration-line-through"
                       th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')+'đ'}"></small>
              </td>
              <td>
                <span th:class="${product.stockQuantity == 0} ? 'badge bg-danger' :
                                 (${product.stockQuantity < 5} ? 'badge bg-warning text-dark' : 'badge bg-success')"
                      th:text="${product.stockQuantity}"></span>
              </td>
              <td>
                <span th:class="${product.active} ? 'badge bg-success' : 'badge bg-secondary'"
                      th:text="${product.active} ? 'Đang bán' : 'Ẩn'"></span>
              </td>
              <td class="text-center">
                <a th:href="@{/shop/{id}(id=${product.id})}" class="btn btn-xs btn-outline-info me-1" target="_blank" title="Xem">
                  <i class="fas fa-eye"></i>
                </a>
                <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn btn-xs btn-outline-warning me-1" title="Sửa">
                  <i class="fas fa-edit"></i>
                </a>
                <form th:action="@{/admin/products/delete/{id}(id=${product.id})}" method="post" class="d-inline">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-xs btn-outline-danger" title="Xóa"
                          onclick="return confirm('Ẩn sản phẩm này?')">
                    <i class="fas fa-trash"></i>
                  </button>
                </form>
              </td>
            </tr>
            <tr th:if="${products.content.empty}">
              <td colspan="7" class="text-center text-muted py-4">
                <i class="fas fa-box-open fa-2x mb-2 d-block"></i>Chưa có sản phẩm nào
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <!-- Pagination -->
      <div class="d-flex justify-content-between align-items-center mt-3 px-2">
        <small class="text-muted">
          Tổng <strong th:text="${products.totalElements}"></strong> sản phẩm
        </small>
        <nav th:if="${products.totalPages > 1}">
          <ul class="pagination pagination-sm mb-0">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
              <a class="page-link" th:href="@{/admin/products(page=${currentPage-1})}">‹</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages-1)}"
                th:classappend="${i == currentPage} ? 'active'">
              <a class="page-link" th:text="${i+1}" th:href="@{/admin/products(page=${i})}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == products.totalPages-1} ? 'disabled'">
              <a class="page-link" th:href="@{/admin/products(page=${currentPage+1})}">›</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>function toggleSidebar(){document.querySelector('.admin-sidebar').classList.toggle('collapsed');document.querySelector('.admin-main').classList.toggle('expanded');}</script>
</body>
</html>
