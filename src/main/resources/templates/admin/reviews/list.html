<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head><meta charset="UTF-8"><title>Đánh Giá - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <h4 class="mb-0 fw-bold"><i class="fas fa-star me-2 text-gold"></i>Quản Lý Đánh Giá</h4>
  </div>
  <div class="admin-content">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span><button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="admin-card">
      <table class="table table-hover admin-table align-middle">
        <thead><tr><th>#</th><th>Sản Phẩm</th><th>Khách Hàng</th><th>Sao</th><th>Nội Dung</th><th>Trạng Thái</th><th>Ngày</th><th class="text-center">Thao Tác</th></tr></thead>
        <tbody>
          <tr th:each="review : ${reviews.content}">
            <td th:text="${review.id}"></td>
            <td class="small fw-semibold" th:text="${review.product != null ? review.product.name : '---'}"></td>
            <td class="small" th:text="${review.user != null ? review.user.fullName : 'Ẩn danh'}"></td>
            <td>
              <span th:each="i : ${#numbers.sequence(1,5)}">
                <i th:class="${i <= review.rating} ? 'fas fa-star text-warning' : 'far fa-star text-muted'" style="font-size:0.8rem"></i>
              </span>
            </td>
            <td class="small text-muted" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                th:text="${review.comment}"></td>
            <td>
              <span th:class="${review.approved} ? 'badge bg-success' : 'badge bg-warning text-dark'"
                    th:text="${review.approved} ? 'Đã duyệt' : 'Chờ duyệt'"></span>
            </td>
            <td class="small text-muted" th:text="${#temporals.format(review.createdAt,'dd/MM/yyyy')}"></td>
            <td class="text-center">
              <form th:action="@{/admin/reviews/{id}/approve(id=${review.id})}" method="post" class="d-inline"
                    th:if="${!review.approved}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-xs btn-outline-success me-1" title="Duyệt"><i class="fas fa-check"></i></button>
              </form>
              <form th:action="@{/admin/reviews/{id}/delete(id=${review.id})}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-xs btn-outline-danger" title="Xóa"
                        onclick="return confirm('Xóa đánh giá này?')"><i class="fas fa-trash"></i></button>
              </form>
            </td>
          </tr>
          <tr th:if="${reviews.content.empty}">
            <td colspan="8" class="text-center text-muted py-4"><i class="fas fa-comment-slash fa-2x mb-2 d-block"></i>Chưa có đánh giá</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>function toggleSidebar(){document.querySelector('.admin-sidebar').classList.toggle('collapsed');document.querySelector('.admin-main').classList.toggle('expanded');}</script>
</body></html>
