<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head><meta charset="UTF-8"><title>Người Dùng - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <h4 class="mb-0 fw-bold" th:text="${user.id == null} ? 'Tạo Người Dùng Mới' : 'Sửa Người Dùng'"></h4>
    <div class="ms-auto"><a th:href="@{/admin/users}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i>Quay Lại</a></div>
  </div>
  <div class="admin-content">
    <div class="admin-card" style="max-width:650px">
      <form th:action="@{/admin/users/save}" method="post" th:object="${user}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" th:field="*{id}"/>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Tên đăng nhập <span class="text-danger">*</span></label>
            <input type="text" class="form-control" th:field="*{username}" required th:readonly="${user.id != null}">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
            <input type="email" class="form-control" th:field="*{email}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Mật khẩu <span class="text-danger" th:if="${user.id == null}">*</span></label>
            <input type="password" class="form-control" name="password" th:required="${user.id == null}" placeholder="Để trống nếu không muốn đổi">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Họ và Tên</label>
            <input type="text" class="form-control" th:field="*{fullName}">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Số điện thoại</label>
            <input type="text" class="form-control" th:field="*{phone}">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Địa chỉ</label>
            <input type="text" class="form-control" th:field="*{address}">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Vai Trò</label>
            <select class="form-select" th:field="*{role}">
              <option th:each="r : ${roles}" th:value="${r.name()}" th:text="${r.name()}"></option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Trạng thái</label>
            <select class="form-select" th:field="*{active}">
              <option value="true">Hoạt động</option>
              <option value="false">Khóa</option>
            </select>
          </div>
        </div>
        <div class="mt-4">
          <button type="submit" class="btn btn-gold px-4"><i class="fas fa-save me-2"></i>Lưu</button>
          <a th:href="@{/admin/users}" class="btn btn-outline-secondary ms-2">Hủy</a>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>function toggleSidebar(){document.querySelector('.admin-sidebar').classList.toggle('collapsed');document.querySelector('.admin-main').classList.toggle('expanded');}</script>
</body></html>
