<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head><meta charset="UTF-8"><title>Người Dùng - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <h4 class="mb-0 fw-bold"><i class="fas fa-users me-2 text-gold"></i>Quản Lý Người Dùng</h4>
    <div class="ms-auto">
      <a th:href="@{/admin/users/new}" class="btn btn-gold btn-sm"><i class="fas fa-plus me-1"></i>Thêm Mới</a>
    </div>
  </div>
  <div class="admin-content">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span><button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
      <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span><button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="admin-card">
      <table class="table table-hover admin-table align-middle">
        <thead><tr><th>#</th><th>Người Dùng</th><th>Email</th><th>Điện Thoại</th><th>Vai Trò</th><th>Trạng Thái</th><th>Ngày Tạo</th><th class="text-center">Thao Tác</th></tr></thead>
        <tbody>
          <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td>
              <div class="d-flex align-items-center gap-2">
                <div class="mini-avatar"><i class="fas fa-user-circle fa-2x text-gold"></i></div>
                <div>
                  <div class="fw-semibold" th:text="${user.fullName ?: user.username}"></div>
                  <small class="text-muted" th:text="${user.username}"></small>
                </div>
              </div>
            </td>
            <td class="small" th:text="${user.email}"></td>
            <td class="small" th:text="${user.phone}"></td>
            <td>
              <span th:class="${user.role.name() == 'ADMIN'} ? 'badge bg-danger' : 'badge bg-primary'"
                    th:text="${user.role.name() == 'ADMIN'} ? 'Admin' : 'User'"></span>
            </td>
            <td>
              <span th:class="${user.active} ? 'badge bg-success' : 'badge bg-secondary'"
                    th:text="${user.active} ? 'Hoạt động' : 'Đã khóa'"></span>
            </td>
            <td class="small text-muted" th:text="${#temporals.format(user.createdAt,'dd/MM/yyyy')}"></td>
            <td class="text-center">
              <div class="d-flex justify-content-center gap-1">
                <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="btn btn-xs btn-outline-primary">Sửa</a>
                <form th:action="@{/admin/users/{id}/toggle-lock(id=${user.id})}" method="post" class="d-inline"
                      th:if="${user.role.name() != 'ADMIN'}">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit"
                          th:class="${user.active} ? 'btn btn-xs btn-outline-warning' : 'btn btn-xs btn-outline-success'"
                          th:text="${user.active} ? 'Khóa' : 'Mở'"
                          th:onclick="${user.active} ? 'return confirm(\'Khóa tài khoản này?\')' : 'return confirm(\'Mở khóa tài khoản?\')'">
                  </button>
                </form>
                <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post" class="d-inline"
                      th:if="${user.role.name() != 'ADMIN'}">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-xs btn-outline-danger"
                          onclick="return confirm('Bạn có chắc muốn xóa tài khoản này?')">Xóa</button>
                </form>
                <span th:if="${user.role.name() == 'ADMIN'}" class="text-muted small">--</span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>function toggleSidebar(){document.querySelector('.admin-sidebar').classList.toggle('collapsed');document.querySelector('.admin-main').classList.toggle('expanded');}</script>
</body></html>
