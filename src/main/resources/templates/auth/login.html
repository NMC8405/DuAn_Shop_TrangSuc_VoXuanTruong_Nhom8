<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập - LuxeJewel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="auth-card">
    <!-- Brand -->
    <div class="auth-brand text-center mb-4">
      <a th:href="@{/}" class="text-decoration-none">
        <div class="brand-icon mb-2"><i class="fas fa-gem"></i></div>
        <h3 class="brand-name">LuxeJewel</h3>
        <p class="text-muted small">Trang Sức Cao Cấp</p>
      </a>
    </div>

    <h5 class="text-center mb-4 fw-bold">Đăng Nhập Tài Khoản</h5>

    <!-- Alerts -->
    <div th:if="${error}" class="alert alert-danger d-flex align-items-center py-2" role="alert">
      <i class="fas fa-exclamation-circle me-2"></i>
      <span th:text="${error}"></span>
    </div>
    <div th:if="${success}" class="alert alert-success d-flex align-items-center py-2" role="alert">
      <i class="fas fa-check-circle me-2"></i>
      <span th:text="${success}"></span>
    </div>
    <div th:if="${logout}" class="alert alert-info d-flex align-items-center py-2" role="alert">
      <i class="fas fa-info-circle me-2"></i>
      <span th:text="${logout}"></span>
    </div>

    <!-- Form -->
    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="mb-3">
        <label class="form-label fw-semibold">Tên đăng nhập</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user text-gold"></i></span>
          <input type="text" class="form-control" name="username" placeholder="Nhập tên đăng nhập" required autofocus>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Mật khẩu</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock text-gold"></i></span>
          <input type="password" class="form-control" name="password" id="password" placeholder="Nhập mật khẩu" required>
          <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password', this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="remember-me" id="rememberMe">
          <label class="form-check-label small" for="rememberMe">Ghi nhớ đăng nhập</label>
        </div>
      </div>

      <button type="submit" class="btn btn-gold w-100 py-2 fw-bold">
        <i class="fas fa-sign-in-alt me-2"></i>Đăng Nhập
      </button>
    </form>

    <hr class="my-4">
    <p class="text-center mb-0 small">
      Chưa có tài khoản?
      <a th:href="@{/register}" class="text-gold fw-bold text-decoration-none">Đăng ký ngay</a>
    </p>
    <p class="text-center mt-2">
      <a th:href="@{/}" class="text-muted small text-decoration-none">
        <i class="fas fa-arrow-left me-1"></i>Quay lại trang chủ
      </a>
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  }
</script>
</body>
</html>
