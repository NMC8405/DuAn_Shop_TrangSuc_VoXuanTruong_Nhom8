<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Ký - LuxeJewel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="auth-card" style="max-width:520px">
    <div class="auth-brand text-center mb-4">
      <a th:href="@{/}" class="text-decoration-none">
        <div class="brand-icon mb-2"><i class="fas fa-gem"></i></div>
        <h3 class="brand-name">LuxeJewel</h3>
      </a>
    </div>

    <h5 class="text-center mb-4 fw-bold">Tạo Tài Khoản Mới</h5>

    <div th:if="${error}" class="alert alert-danger py-2">
      <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
    </div>

    <form th:action="@{/register}" method="post" th:object="${registerDto}" novalidate>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-semibold">Họ và tên <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-id-card text-gold"></i></span>
            <input type="text" class="form-control" th:field="*{fullName}"
                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'" placeholder="Nguyễn Văn A">
            <div class="invalid-feedback" th:errors="*{fullName}"></div>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Tên đăng nhập <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user text-gold"></i></span>
            <input type="text" class="form-control" th:field="*{username}"
                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'" placeholder="username123">
            <div class="invalid-feedback" th:errors="*{username}"></div>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Số điện thoại</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-phone text-gold"></i></span>
            <input type="tel" class="form-control" th:field="*{phone}"
                   th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'" placeholder="0901234567">
            <div class="invalid-feedback" th:errors="*{phone}"></div>
          </div>
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope text-gold"></i></span>
            <input type="email" class="form-control" th:field="*{email}"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="email@example.com">
            <div class="invalid-feedback" th:errors="*{email}"></div>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Mật khẩu <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock text-gold"></i></span>
            <input type="password" class="form-control" th:field="*{password}" id="pwd"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" placeholder="Tối thiểu 6 ký tự">
            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('pwd', this)">
              <i class="fas fa-eye"></i></button>
            <div class="invalid-feedback" th:errors="*{password}"></div>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Xác nhận mật khẩu <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock text-gold"></i></span>
            <input type="password" class="form-control" th:field="*{confirmPassword}" id="cpwd"
                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'" placeholder="Nhập lại mật khẩu">
            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('cpwd', this)">
              <i class="fas fa-eye"></i></button>
            <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-gold w-100 py-2 fw-bold mt-4">
        <i class="fas fa-user-plus me-2"></i>Đăng Ký Ngay
      </button>
    </form>

    <hr class="my-4">
    <p class="text-center mb-0 small">
      Đã có tài khoản?
      <a th:href="@{/login}" class="text-gold fw-bold text-decoration-none">Đăng nhập</a>
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  input.type = input.type === 'password' ? 'text' : 'password';
  icon.classList.toggle('fa-eye'); icon.classList.toggle('fa-eye-slash');
}
</script>
</body>
</html>
