<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Giỏ Hàng - LuxeJewel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-header py-3">
  <div class="container">
    <nav><ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a th:href="@{/}">Trang Chủ</a></li>
      <li class="breadcrumb-item active">Giỏ Hàng</li>
    </ol></nav>
  </div>
</div>

<div class="container py-5">
  <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
    <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
    <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <h2 class="page-title mb-4"><i class="fas fa-shopping-bag text-gold me-2"></i>Giỏ Hàng Của Tôi</h2>

  <div th:if="${!cartItems.empty}">
    <div class="row g-4">
      <div class="col-lg-8">
        <div class="cart-table-wrap">
          <table class="table cart-table">
            <thead>
              <tr>
                <th>Sản Phẩm</th>
                <th class="text-center">Đơn Giá</th>
                <th class="text-center">Số Lượng</th>
                <th class="text-center">Thành Tiền</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="item : ${cartItems}">
                <td>
                  <div class="d-flex align-items-center gap-3">
                    <a th:href="@{/shop/{id}(id=${item.product.id})}">
                      <img th:src="${item.product.mainImage != null} ? ${item.product.mainImage} : '/images/no-image.png'"
                           class="cart-product-img" th:alt="${item.product.name}">
                    </a>
                    <div>
                      <a th:href="@{/shop/{id}(id=${item.product.id})}"
                         th:text="${item.product.name}"
                         class="cart-product-name text-decoration-none text-dark fw-semibold"></a>
                      <div class="text-muted small" th:text="${item.product.brand}"></div>
                    </div>
                  </div>
                </td>
                <td class="text-center align-middle">
                  <span class="fw-semibold text-gold"
                        th:text="${#numbers.formatDecimal(item.product.currentPrice, 0, 'COMMA', 0, 'POINT') + 'đ'}"></span>
                </td>
                <td class="text-center align-middle">
                  <form th:action="@{/cart/update/{id}(id=${item.id})}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="qty-control-sm">
                      <button type="submit" name="quantity" th:value="${item.quantity - 1}" class="qty-btn-sm">−</button>
                      <span class="qty-input-sm" th:text="${item.quantity}"></span>
                      <button type="submit" name="quantity" th:value="${item.quantity + 1}" class="qty-btn-sm">+</button>
                    </div>
                  </form>
                </td>
                <td class="text-center align-middle fw-bold text-gold">
                  <span th:text="${#numbers.formatDecimal(item.product.currentPrice * item.quantity, 0, 'COMMA', 0, 'POINT') + 'đ'}"></span>
                </td>
                <td class="text-center align-middle">
                  <form th:action="@{/cart/remove/{id}(id=${item.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-outline-danger"
                            onclick="return confirm('Xóa sản phẩm này?')">
                      <i class="fas fa-trash"></i>
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="mt-3">
          <a th:href="@{/shop}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-2"></i>Tiếp Tục Mua Sắm
          </a>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="order-summary-card">
          <h5 class="fw-bold mb-4"><i class="fas fa-receipt me-2 text-gold"></i>Tóm Tắt Đơn Hàng</h5>
          <div class="mb-4">
            <label class="form-label fw-semibold small">Mã Giảm Giá</label>
            <div class="input-group">
              <input type="text" class="form-control" id="couponInput"
                     placeholder="Nhập mã coupon" style="text-transform:uppercase">
              <button class="btn btn-outline-gold" type="button" onclick="applyCoupon()">Áp dụng</button>
            </div>
            <div id="couponMsg" class="mt-1 small"></div>
          </div>
          <div class="summary-row">
            <span>Tạm tính</span>
            <span th:text="${#numbers.formatDecimal(cartTotal, 0, 'COMMA', 0, 'POINT') + 'đ'}"></span>
          </div>
          <div class="summary-row text-success" id="discountRow" style="display:none">
            <span>Giảm giá</span>
            <span id="discountAmt">-0đ</span>
          </div>
          <div class="summary-row">
            <span>Phí vận chuyển</span>
            <span class="text-success fw-semibold"
                  th:text="${cartTotal >= 2000000} ? 'Miễn phí' : '30.000đ'"></span>
          </div>
          <hr>
          <div class="summary-total">
            <span>Tổng Cộng</span>
            <span id="grandTotal" class="text-gold fw-bold"
                  th:text="${#numbers.formatDecimal(cartTotal, 0, 'COMMA', 0, 'POINT') + 'đ'}"></span>
          </div>
          <a th:href="@{/checkout}" class="btn btn-gold w-100 py-3 mt-4 fw-bold">
            <i class="fas fa-lock me-2"></i>Đặt Hàng Ngay
          </a>
        </div>
      </div>
    </div>
  </div>

  <div th:if="${cartItems.empty}" class="empty-state text-center py-5">
    <i class="fas fa-shopping-bag fa-4x text-muted mb-4"></i>
    <h4 class="text-muted">Giỏ hàng trống</h4>
    <p class="text-muted">Hãy khám phá và thêm những sản phẩm yêu thích!</p>
    <a th:href="@{/shop}" class="btn btn-gold btn-lg mt-3">
      <i class="fas fa-gem me-2"></i>Mua Sắm Ngay
    </a>
  </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script th:inline="javascript">
const cartTotal = /*[[${cartTotal}]]*/ 0;

function applyCoupon() {
  const code = document.getElementById('couponInput').value.trim();
  if (!code) { showToast('Vui lòng nhập mã giảm giá!', 'warning'); return; }
  const csrf = getCsrfToken();
  fetch('/cart/apply-coupon', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded', [csrf.header]: csrf.token },
    body: 'couponCode=' + encodeURIComponent(code) + '&orderAmount=' + cartTotal
  })
  .then(r => r.json())
  .then(data => {
    const msg = document.getElementById('couponMsg');
    if (data.success) {
      document.getElementById('discountRow').style.display = 'flex';
      document.getElementById('discountAmt').textContent = '-' + Math.round(data.discount).toLocaleString('vi-VN') + 'đ';
      document.getElementById('grandTotal').textContent = Math.round(cartTotal - data.discount).toLocaleString('vi-VN') + 'đ';
      msg.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>' + data.message + '</span>';
      showToast(data.message, 'success');
    } else {
      msg.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>' + data.message + '</span>';
      showToast(data.message, 'danger');
    }
  });
}
</script>
</body>
</html>
