<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Trang Sức - LuxeJewel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Breadcrumb -->
<div class="page-header py-3">
  <div class="container">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a th:href="@{/}">Trang Chủ</a></li>
        <li class="breadcrumb-item active">Trang Sức</li>
      </ol>
    </nav>
  </div>
</div>

<div class="container py-4">
  <div class="row g-4">

    <!-- ===== SIDEBAR FILTER ===== -->
    <div class="col-lg-3">
      <div class="filter-sidebar">
        <h5 class="filter-title"><i class="fas fa-filter me-2 text-gold"></i>Bộ Lọc</h5>

        <form th:action="@{/shop}" method="get" id="filterForm">
          <!-- Keyword -->
          <div class="filter-group">
            <label class="filter-label">Tìm kiếm</label>
            <input type="text" class="form-control" name="keyword"
                   th:value="${keyword}" placeholder="Tên sản phẩm...">
          </div>

          <!-- Category -->
          <div class="filter-group">
            <label class="filter-label">Danh Mục</label>
            <div class="filter-options">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="categoryId" value="" id="catAll"
                       th:checked="${categoryId == null}">
                <label class="form-check-label" for="catAll">Tất cả</label>
              </div>
              <div class="form-check" th:each="cat : ${categories}">
                <input class="form-check-input" type="radio" name="categoryId"
                       th:value="${cat.id}" th:id="'cat'+${cat.id}"
                       th:checked="${categoryId == cat.id}">
                <label class="form-check-label" th:for="'cat'+${cat.id}" th:text="${cat.name}"></label>
              </div>
            </div>
          </div>

          <!-- Price Range -->
          <div class="filter-group">
            <label class="filter-label">Khoảng Giá</label>
            <div class="row g-2">
              <div class="col-6">
                <input type="number" class="form-control form-control-sm" name="minPrice"
                       th:value="${minPrice}" placeholder="Từ (đ)">
              </div>
              <div class="col-6">
                <input type="number" class="form-control form-control-sm" name="maxPrice"
                       th:value="${maxPrice}" placeholder="Đến (đ)">
              </div>
            </div>
            <div class="price-presets mt-2">
              <button type="button" class="price-preset" onclick="setPrice(0, 1000000)">Dưới 1tr</button>
              <button type="button" class="price-preset" onclick="setPrice(1000000, 5000000)">1-5tr</button>
              <button type="button" class="price-preset" onclick="setPrice(5000000, 20000000)">5-20tr</button>
              <button type="button" class="price-preset" onclick="setPrice(20000000, '')">Trên 20tr</button>
            </div>
          </div>

          <!-- Brand -->
          <div class="filter-group">
            <label class="filter-label">Thương Hiệu</label>
            <input type="text" class="form-control" name="brand"
                   th:value="${brand}" placeholder="PNJ, DOJI, SJC...">
          </div>

          <!-- Sort -->
          <div class="filter-group">
            <label class="filter-label">Sắp Xếp</label>
            <select class="form-select" name="sort">
              <option value="newest" th:selected="${sort == 'newest'}">Mới nhất</option>
              <option value="price_asc" th:selected="${sort == 'price_asc'}">Giá tăng dần</option>
              <option value="price_desc" th:selected="${sort == 'price_desc'}">Giá giảm dần</option>
              <option value="popular" th:selected="${sort == 'popular'}">Phổ biến nhất</option>
            </select>
          </div>

          <button type="submit" class="btn btn-gold w-100 mb-2">
            <i class="fas fa-search me-2"></i>Tìm Kiếm
          </button>
          <a th:href="@{/shop}" class="btn btn-outline-secondary w-100 btn-sm">
            <i class="fas fa-redo me-1"></i>Xóa bộ lọc
          </a>
        </form>
      </div>
    </div>

    <!-- ===== PRODUCT GRID ===== -->
    <div class="col-lg-9">
      <!-- Result info -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <p class="mb-0 text-muted">
          Tìm thấy <strong th:text="${products.totalElements}"></strong> sản phẩm
          <span th:if="${keyword}" class="ms-1">cho "<strong th:text="${keyword}"></strong>"</span>
        </p>
      </div>

      <!-- Products -->
      <div th:if="${!products.content.empty}">
        <div class="row g-4">
          <div class="col-xl-4 col-md-6" th:each="product : ${products.content}">
            <div th:replace="~{fragments/product-card :: productCard(${product})}"></div>
          </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${totalPages > 1}" class="mt-5">
          <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
              <a class="page-link"
                 th:href="@{/shop(page=${currentPage-1}, keyword=${keyword}, categoryId=${categoryId},
                            minPrice=${minPrice}, maxPrice=${maxPrice}, sort=${sort})}">
                <i class="fas fa-chevron-left"></i>
              </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
              <a class="page-link" th:text="${i + 1}"
                 th:href="@{/shop(page=${i}, keyword=${keyword}, categoryId=${categoryId},
                            minPrice=${minPrice}, maxPrice=${maxPrice}, sort=${sort})}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
              <a class="page-link"
                 th:href="@{/shop(page=${currentPage+1}, keyword=${keyword}, categoryId=${categoryId},
                            minPrice=${minPrice}, maxPrice=${maxPrice}, sort=${sort})}">
                <i class="fas fa-chevron-right"></i>
              </a>
            </li>
          </ul>
        </nav>
      </div>

      <!-- Empty state -->
      <div th:if="${products.content.empty}" class="empty-state text-center py-5">
        <i class="fas fa-search fa-3x text-muted mb-3"></i>
        <h5 class="text-muted">Không tìm thấy sản phẩm nào</h5>
        <p class="text-muted">Thử thay đổi bộ lọc hoặc từ khóa tìm kiếm</p>
        <a th:href="@{/shop}" class="btn btn-gold mt-2">Xem tất cả sản phẩm</a>
      </div>
    </div>
  </div>
</div>

<!-- Quick View Modal -->
<div class="modal fade" id="quickViewModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">Xem Nhanh</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="quickViewContent">
        <div class="text-center py-4"><div class="spinner-border text-gold"></div></div>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script>
function setPrice(min, max) {
  document.querySelector('[name=minPrice]').value = min || '';
  document.querySelector('[name=maxPrice]').value = max || '';
}
</script>
</body>
</html>
