<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi Tiết Đơn Hàng - LuxeJewel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="page-title mb-0">Đơn Hàng #<span th:text="${order.id}"></span></h3>
    <a th:href="@{/user/orders}" class="btn btn-outline-secondary btn-sm">
      <i class="fas fa-arrow-left me-1"></i>Quay Lại
    </a>
  </div>
  <div th:if="${success}" class="alert alert-success"><i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span></div>
  <div th:if="${error}" class="alert alert-danger"><i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span></div>
  <div class="row g-4">
    <div class="col-lg-8">
      <div class="checkout-card mb-4">
        <h6 class="fw-bold mb-3">Trạng Thái Đơn Hàng</h6>
        <div class="order-timeline">
          <div th:class="${order.status.name() != 'CANCELLED'} ? 'timeline-step active' : 'timeline-step'">
            <div class="timeline-icon"><i class="fas fa-clock"></i></div><div class="timeline-label">Chờ Xác Nhận</div>
          </div>
          <div th:class="${order.status.name() == 'CONFIRMED' or order.status.name() == 'SHIPPING' or order.status.name() == 'COMPLETED'} ? 'timeline-line done' : 'timeline-line'"></div>
          <div th:class="${order.status.name() == 'CONFIRMED' or order.status.name() == 'SHIPPING' or order.status.name() == 'COMPLETED'} ? 'timeline-step active' : 'timeline-step'">
            <div class="timeline-icon"><i class="fas fa-check"></i></div><div class="timeline-label">Đã Xác Nhận</div>
          </div>
          <div th:class="${order.status.name() == 'SHIPPING' or order.status.name() == 'COMPLETED'} ? 'timeline-line done' : 'timeline-line'"></div>
          <div th:class="${order.status.name() == 'SHIPPING' or order.status.name() == 'COMPLETED'} ? 'timeline-step active' : 'timeline-step'">
            <div class="timeline-icon"><i class="fas fa-truck"></i></div><div class="timeline-label">Đang Giao</div>
          </div>
          <div th:class="${order.status.name() == 'COMPLETED'} ? 'timeline-line done' : 'timeline-line'"></div>
          <div th:class="${order.status.name() == 'COMPLETED'} ? 'timeline-step active' : 'timeline-step'">
            <div class="timeline-icon"><i class="fas fa-home"></i></div><div class="timeline-label">Hoàn Thành</div>
          </div>
        </div>
        <div th:if="${order.status.name() == 'CANCELLED'}" class="alert alert-danger mt-3 mb-0">
          <i class="fas fa-ban me-2"></i>Đơn hàng đã bị hủy
        </div>
      </div>
      <div class="checkout-card">
        <h6 class="fw-bold mb-3">Sản Phẩm Đã Đặt</h6>
        <div class="order-item" th:each="item : ${order.orderItems}">
          <img th:src="${item.productImage != null} ? ${item.productImage} : '/images/no-image.png'" class="order-item-img">
          <div class="flex-grow-1 ms-3">
            <div class="fw-semibold" th:text="${item.productName}"></div>
            <div class="text-muted small">
              <span th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + 'đ'}"></span>
              × <span th:text="${item.quantity}"></span>
            </div>
          </div>
          <div class="fw-bold text-gold"
               th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT') + 'đ'}"></div>
        </div>
      </div>
    </div>
    <div class="col-lg-4">
      <div class="checkout-card mb-4">
        <h6 class="fw-bold mb-3"><i class="fas fa-map-marker-alt text-gold me-2"></i>Địa Chỉ Giao Hàng</h6>
        <p class="mb-1"><strong th:text="${order.shippingName}"></strong></p>
        <p class="mb-1 text-muted small"><i class="fas fa-phone me-1"></i><span th:text="${order.shippingPhone}"></span></p>
        <p class="mb-0 text-muted small"><i class="fas fa-map me-1"></i><span th:text="${order.shippingAddress}"></span></p>
      </div>
      <div class="checkout-card">
        <h6 class="fw-bold mb-3"><i class="fas fa-receipt text-gold me-2"></i>Thanh Toán</h6>
        <div class="summary-row"><span>Tổng tiền hàng</span>
          <span th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}"></span></div>
        <div class="summary-row text-success" th:if="${order.discountAmount > 0}">
          <span>Giảm giá</span>
          <span th:text="'-' + ${#numbers.formatDecimal(order.discountAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}"></span>
        </div>
        <hr>
        <div class="summary-total">
          <span>Tổng Cộng</span>
          <span class="text-gold fw-bold" th:text="${#numbers.formatDecimal(order.finalAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}"></span>
        </div>
        <div th:if="${order.status.name() == 'PENDING'}" class="mt-3">
          <form th:action="@{/user/orders/{id}/cancel(id=${order.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-danger w-100"
                    onclick="return confirm('Bạn có chắc muốn hủy đơn hàng này?')">
              <i class="fas fa-times me-2"></i>Hủy Đơn Hàng
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
