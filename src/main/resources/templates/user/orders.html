<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đơn Hàng - LuxeJewel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page-header py-3"><div class="container">
  <nav><ol class="breadcrumb mb-0">
    <li class="breadcrumb-item"><a th:href="@{/}">Trang Chủ</a></li>
    <li class="breadcrumb-item active">Đơn Hàng</li>
  </ol></nav>
</div></div>
<div class="container py-4">
  <h3 class="page-title mb-4"><i class="fas fa-box text-gold me-2"></i>Đơn Hàng Của Tôi</h3>
  <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
    <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
    <button class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${!orders.empty}">
    <div class="order-card mb-3" th:each="order : ${orders}">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
          <span class="fw-bold">Đơn #<span th:text="${order.id}"></span></span>
          <span class="text-muted ms-2 small"
                th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy HH:mm')}"></span>
        </div>
        <div class="d-flex align-items-center gap-3">
          <span th:class="'status-badge status-' + ${order.status.name().toLowerCase()}"
                th:text="${order.status.displayName}"></span>
          <span class="fw-bold text-gold"
                th:text="${#numbers.formatDecimal(order.finalAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}"></span>
          <a th:href="@{/user/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-gold">Chi Tiết</a>
        </div>
      </div>
    </div>
  </div>
  <div th:if="${orders.empty}" class="empty-state text-center py-5">
    <i class="fas fa-box-open fa-4x text-muted mb-3"></i>
    <h5 class="text-muted">Bạn chưa có đơn hàng nào</h5>
    <a th:href="@{/shop}" class="btn btn-gold mt-3"><i class="fas fa-gem me-2"></i>Mua Sắm Ngay</a>
  </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
