<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tài Khoản - LuxeJewel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">
  <h3 class="page-title mb-4"><i class="fas fa-user text-gold me-2"></i>Tài Khoản Của Tôi</h3>
  <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
    <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
    <button class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
    <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
    <button class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div class="row g-4">
    <div class="col-lg-4">
      <div class="profile-card text-center">
        <div class="profile-avatar"><i class="fas fa-user-circle fa-5x text-gold"></i></div>
        <h5 class="mt-3 mb-1" th:text="${user.fullName ?: user.username}"></h5>
        <p class="text-muted small" th:text="${user.email}"></p>
        <span class="badge bg-gold" th:text="${user.role.name() == 'ADMIN'} ? 'Quản trị viên' : 'Khách hàng'"></span>
        <div class="mt-3">
          <a th:href="@{/user/orders}" class="btn btn-outline-gold btn-sm w-100 mb-2">
            <i class="fas fa-box me-2"></i>Lịch Sử Đơn Hàng
          </a>
          <a th:href="@{/shop}" class="btn btn-gold btn-sm w-100">
            <i class="fas fa-gem me-2"></i>Tiếp Tục Mua Sắm
          </a>
        </div>
      </div>
    </div>
    <div class="col-lg-8">
      <ul class="nav nav-tabs mb-4" id="profileTab">
        <li class="nav-item">
          <a class="nav-link active" data-bs-toggle="tab" href="#infoTab">
            <i class="fas fa-user me-1"></i>Thông Tin
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-bs-toggle="tab" href="#passwordTab">
            <i class="fas fa-lock me-1"></i>Đổi Mật Khẩu
          </a>
        </li>
      </ul>
      <div class="tab-content">
        <!-- Info tab -->
        <div class="tab-pane fade show active" id="infoTab">
          <div class="checkout-card">
            <form th:action="@{/user/profile}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Họ và tên</label>
                  <input type="text" class="form-control" name="fullName" th:value="${user.fullName}" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Tên đăng nhập</label>
                  <input type="text" class="form-control" th:value="${user.username}" disabled>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Email</label>
                  <input type="email" class="form-control" th:value="${user.email}" disabled>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Số điện thoại</label>
                  <input type="tel" class="form-control" name="phone" th:value="${user.phone}"
                         pattern="[0-9]{10,11}" placeholder="0901234567">
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold">Địa chỉ giao hàng mặc định</label>
                  <input type="text" class="form-control" name="address" th:value="${user.address}"
                         placeholder="Số nhà, đường, phường, quận, tỉnh/thành">
                </div>
              </div>
              <button type="submit" class="btn btn-gold mt-4 px-4">
                <i class="fas fa-save me-2"></i>Lưu Thay Đổi
              </button>
            </form>
          </div>
        </div>
        <!-- Password tab -->
        <div class="tab-pane fade" id="passwordTab">
          <div class="checkout-card">
            <form th:action="@{/user/change-password}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <div class="mb-3">
                <label class="form-label fw-semibold">Mật khẩu hiện tại</label>
                <input type="password" class="form-control" name="oldPassword" required>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Mật khẩu mới</label>
                <input type="password" class="form-control" name="newPassword" minlength="6" required>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Xác nhận mật khẩu mới</label>
                <input type="password" class="form-control" name="confirmPassword" minlength="6" required>
              </div>
              <button type="submit" class="btn btn-outline-gold px-4">
                <i class="fas fa-key me-2"></i>Đổi Mật Khẩu
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
